<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strain Metrics Inspector</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-section {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 5px;
            text-align: center;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        canvas {
            max-width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Strain Metrics Inspector</h1>

    <div class="upload-section">
        <input type="file" id="jsonFile" accept=".json" multiple>
        <p>Drop JSON files here or click to select</p>
    </div>

    <div id="summary" class="summary" style="display: none;">
        <div class="stat-card">
            <div class="stat-value" id="totalStrain">-</div>
            <div class="stat-label">Total Strain</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgHR">-</div>
            <div class="stat-label">Average HR (bpm)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="maxHR">-</div>
            <div class="stat-label">Max HR (bpm)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="activeMin">-</div>
            <div class="stat-label">Active Minutes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="sampleCount">-</div>
            <div class="stat-label">Sample Count</div>
        </div>
    </div>

    <canvas id="hrChart"></canvas>

    <script>
        let chart = null;
        const fileInput = document.getElementById('jsonFile');
        const summaryDiv = document.getElementById('summary');
        const totalStrainEl = document.getElementById('totalStrain');
        const avgHREl = document.getElementById('avgHR');
        const maxHREl = document.getElementById('maxHR');
        const activeMinEl = document.getElementById('activeMin');
        const sampleCountEl = document.getElementById('sampleCount');

        fileInput.addEventListener('change', handleFiles);

        function handleFiles(event) {
            const files = event.target.files;
            if (files.length > 0) {
                processFiles(files);
            }
        }

        async function processFiles(files) {
            let allSamples = [];
            let totalStrain = 0;
            let sumHR = 0;
            let maxHR = 0;
            let activeMin = 0;
            let sampleCount = 0;

            for (const file of files) {
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);

                    totalStrain += data.total_strain || 0;
                    sumHR += (data.avg_hr || 0) * (data.samples ? data.samples.length : 0);
                    maxHR = Math.max(maxHR, data.max_hr || 0);
                    activeMin += data.active_min || 0;
                    sampleCount += data.samples ? data.samples.length : 0;

                    if (data.samples) {
                        allSamples = allSamples.concat(data.samples);
                    }
                } catch (error) {
                    console.error('Error parsing file:', file.name, error);
                }
            }

            // Sort samples by timestamp
            allSamples.sort((a, b) => a.timestamp - b.timestamp);

            // Update summary
            totalStrainEl.textContent = totalStrain.toFixed(1);
            avgHREl.textContent = sampleCount > 0 ? (sumHR / sampleCount).toFixed(1) : '0';
            maxHREl.textContent = maxHR;
            activeMinEl.textContent = activeMin;
            sampleCountEl.textContent = sampleCount;
            summaryDiv.style.display = 'grid';

            // Create chart
            createChart(allSamples);
        }

        function createChart(samples) {
            const ctx = document.getElementById('hrChart').getContext('2d');

            if (chart) {
                chart.destroy();
            }

            const labels = samples.map(s => new Date(s.timestamp).toLocaleTimeString());
            const hrData = samples.map(s => s.hr);

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Heart Rate (bpm)',
                        data: hrData,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Time'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Heart Rate (bpm)'
                            },
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Heart Rate Over Time'
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
