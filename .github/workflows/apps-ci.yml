name: CI Apps

on:
  push:
    branches: [ develop, main ]
    tags: [ '*' ]
  pull_request:

env:
  DOCKER_DRIVER: overlay2
  APPS_OUT_CONF: Release
  APPS_EXCLUDED: |
    Utility1
    Utility2
    Utility3
    Utility4
    Glance1
    HRMonitor

jobs:
  prepare:
    runs-on: ubuntu-latest
    container: python:3.11-slim
    outputs:
      apps: ${{ steps.generate.outputs.apps }}
    steps:
      - name: Setup GIT
        run: apt update && apt install -y git

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Generate app list
        id: generate
        run: python3 .github/scripts/generate-app-list.py

  apps-build:
    runs-on: ubuntu-latest
    container: xanderhendriks/stm32cubeide:16.0
    env:
      GITHUB_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
    needs: prepare
    strategy:
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.apps) }}
    steps:
      - name: Setup GIT
        run: apt update && apt install -y git

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Build app ${{ matrix.app }}
        run: |
          echo "Setup environment"
          . SDK/Utilities/Scripts/build-cube/setup-environment.sh
          echo "Building app: ${{ matrix.app }}"
          # Discover projects for this app
          CUBEIDE_PROJECTS=`python3 .github/scripts/generate-app-list.py --app ${{ matrix.app }}`
          if [ -z "$CUBEIDE_PROJECTS" ]; then
            echo "ERROR: No CubeIDE projects found for app ${{ matrix.app }}" >&2
            exit 1
          fi
          echo "Projects:"
          echo "$CUBEIDE_PROJECTS"
          temp_non="/tmp/non_service_$$"
          temp_svc="/tmp/service_$$"
          touch "$temp_non" "$temp_svc"
          for p in $CUBEIDE_PROJECTS; do
            if echo "$p" | grep -q Service; then
              echo "$p" >> "$temp_svc"
            else
              echo "$p" >> "$temp_non"
            fi
          done
          cat "$temp_non" "$temp_svc" | while IFS= read -r p; do
            [ -z "$p" ] && continue
            echo "Building project: $p"
            SDK/Utilities/Scripts/build-cube/build-cube.sh "$p"
          done
          rm -f "$temp_non" "$temp_svc"
          echo "App build complete: ${{ matrix.app }}"

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.app }}
          path: Apps/${{ matrix.app }}/Output/${{ env.APPS_OUT_CONF }}/*.uapp

  release:
    runs-on: ubuntu-latest
    needs: apps-build
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - id: create_release
        name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_PAT }}

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            🚀 UNA Apps: ${{ steps.create_release.outputs.name || github.ref_name }} (${{ steps.create_release.outputs.tag_name }})\n
            📝 Release Notes: \n${{ steps.create_release.outputs.body }}\n
            👤 Author: ${{ steps.create_release.outputs.author }}\n
            📅 Created: ${{ steps.create_release.outputs.created_at }}\n
            🔗 Download: ${{ steps.create_release.outputs.url }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
